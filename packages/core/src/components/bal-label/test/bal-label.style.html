          <label class="label is-normal">Normal</label>

      <!-- Colors -->
      <section>
        <span>Colors</span>
        <div class="stack-content">
          <label class="label is-success">Success</label>
          <label class="label is-warning">Warning</label>

          <label class="label is-disabled">Disabled</label>
          <label class="label">Base</label>
          <label class="label is-hovered">Hovered</label>
          <label class="label is-pressed">Pressed</label>

          <label class="label is-danger">Danger</label>
