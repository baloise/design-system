<!doctype html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <link rel="stylesheet" href="/assets/section.css" />
    <link rel="stylesheet" href="/assets/styles/baloise-design-system.local.min.css" />

    <script type="module" src="/build/baloise-design-system.esm.js"></script>
    <script nomodule src="/build/baloise-design-system.js"></script>
  </head>
  <body>
    <main class="container">
      <!-- Basic -->
      <section>
        <span>Basic</span>
        <bal-spinner></bal-spinner>
      </section>

      <!-- Sizes -->
      <section>
        <span>Sizes</span>
        <bal-spinner small></bal-spinner>
      </section>

      <!-- Inverted -->
      <section class="s-bg-inverted">
        <span>Inverted</span>
        <bal-spinner inverted></bal-spinner>
      </section>

      <!-- Circle Variation -->
      <section class="s-bg-1">
        <span>Circle Variation</span>
        <div class="stack as-row">
          <bal-spinner variation="circle"></bal-spinner>
          <bal-spinner variation="circle" color="white"></bal-spinner>
          <bal-spinner variation="circle" small></bal-spinner>
        </div>
      </section>
    </main>
  </body>
</html>
