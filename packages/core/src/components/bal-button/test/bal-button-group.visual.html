<!doctype html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <link rel="stylesheet" href="/assets/section.css" />
    <link rel="stylesheet" href="/assets/styles/baloise-design-system.local.min.css" />

    <script type="module" src="/build/baloise-design-system.esm.js"></script>
    <script nomodule src="/build/baloise-design-system.js"></script>
  </head>
  <body>
    <main class="container">
      <!-- Basic Style -->
      <section data-testid="basic">
        <span>Basic</span>
        <bal-button-group>
          <bal-button>Button</bal-button>
          <bal-button>Button</bal-button>
          <bal-button>Button</bal-button>
        </bal-button-group>
      </section>

      <!-- Group -->
      <section data-testid="group">
        <span>Group</span>
        <bal-button-group>
          <bal-button>Left</bal-button>
          <bal-button>Middle</bal-button>
          <bal-button>Right</bal-button>
        </bal-button-group>
        <bal-button-group position="center">
          <bal-button>Left</bal-button>
          <bal-button>Middle</bal-button>
          <bal-button>Right</bal-button>
        </bal-button-group>
        <bal-button-group position="right">
          <bal-button>Left</bal-button>
          <bal-button>Middle</bal-button>
          <bal-button>Right</bal-button>
        </bal-button-group>
      </section>

      <!-- Long Labels -->
      <section data-testid="long-labels">
        <span>Long Labels</span>
        <bal-button-group>
          <bal-button>Left</bal-button>
          <bal-button>Very long label for a simple button to see if it wraps</bal-button>
          <bal-button>Right</bal-button>
        </bal-button-group>
      </section>

      <!-- Column Group -->
      <section data-testid="column-group">
        <span>Column Group</span>
        <bal-button-group direction="column" position="left">
          <bal-button>Left</bal-button>
          <bal-button>Middle</bal-button>
          <bal-button>Right</bal-button>
        </bal-button-group>
        <bal-button-group direction="column" position="center">
          <bal-button>Left</bal-button>
          <bal-button>Middle</bal-button>
          <bal-button>Right</bal-button>
        </bal-button-group>
        <bal-button-group direction="column" position="right">
          <bal-button>Left</bal-button>
          <bal-button>Middle</bal-button>
          <bal-button>Right</bal-button>
        </bal-button-group>
      </section>

      <!-- Expanded -->
      <section data-testid="expanded">
        <span>Expanded</span>
        <bal-button-group direction="row" expanded>
          <bal-button>Left</bal-button>
          <bal-button>Right</bal-button>
        </bal-button-group>
        <bal-button-group direction="row" expanded>
          <bal-button square>
            <bal-icon name="plus"></bal-icon>
          </bal-button>
          <bal-button>Right</bal-button>
        </bal-button-group>
      </section>

      <!-- Two Row Button Group -->
      <section data-testid="two-row-button-group">
        <span>Two Row Button Group</span>
        <bal-button-group direction="row">
          <bal-button>Left</bal-button>
          <bal-button>Right</bal-button>
        </bal-button-group>
        <bal-button-group direction="row">
          <bal-button square>
            <bal-icon name="plus"></bal-icon>
          </bal-button>
          <bal-button>Right</bal-button>
        </bal-button-group>
      </section>
      
    </main>
  </body>
</html>
