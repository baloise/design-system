<!doctype html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <link rel="stylesheet" href="/assets/section.css" />
    <link rel="stylesheet" href="/assets/css/design-system.local.min.css" />
    <script type="module" src="/build/design-system.esm.js"></script>
    <script nomodule src="/build/design-system.js"></script>
  </head>
  <body>
    <main class="container">
      <!-- Basic -->
      <section data-testid="basic">
        <span>Basic</span>
        <ds-select label="Label 1" required="false"></ds-select>
        <ds-select label="Label 1" description="Description 1"></ds-select>
        <ds-select label="Label 2" description="Description 2"></ds-select>
        <ds-select label="Label 3" description="Description 3" value="opt2"></ds-select>
      </section>

      <!-- Slotted Options -->
      <section data-testid="slotted-options">
        <span>Slotted Options</span>
        <ds-select label="Label" description="Description" id="slotted">
          <ds-select-option value="">-- Chose --</ds-select-option>
          <ds-select-option value="opt1">Option 1</ds-select-option>
          <ds-select-option value="opt2">Option 2</ds-select-option>
        </ds-select>

        <ds-select label="Label" description="Description" id="slotted" value="opt2">
          <ds-select-option value="opt1">Option 1</ds-select-option>
          <ds-select-option value="opt2">Option 2</ds-select-option>
        </ds-select>
      </section>

      <!-- Disabled -->
      <section data-testid="disabled">
        <span>Disabled</span>
        <ds-select label="Label 1" description="Description 1" disabled></ds-select>
        <ds-select label="Label 2" description="Description 2" disabled></ds-select>
        <ds-select label="Label 3" description="Description 3" value="opt2" disabled></ds-select>
      </section>

      <!-- Invalid -->
      <section data-testid="invalid">
        <span>Invalid</span>
        <ds-select label="Label 1" description="Description 1" invalid-text="Validation Error 1" invalid></ds-select>
        <ds-select label="Label 2" description="Description 2" invalid-text="Validation Error 2" invalid></ds-select>
        <ds-select
          label="Label 3"
          description="Description 3"
          value="opt2"
          invalid-text="Validation Error 3"
          invalid
        ></ds-select>
      </section>

      <!-- Valid -->
      <section data-testid="valid">
        <span>Valid</span>
        <ds-select label="Label 1" description="Description 1" color="success"></ds-select>
        <ds-select label="Label 2" description="Description 2" color="success"></ds-select>
        <ds-select label="Label 3" description="Description 3" value="opt2" color="success"></ds-select>
      </section>

      <!-- Warning -->
      <section data-testid="warning">
        <span>Warning</span>
        <ds-select label="Label 1" description="Description 1" color="warning"></ds-select>
        <ds-select label="Label 2" description="Description 2" color="warning"></ds-select>
        <ds-select label="Label 3" description="Description 3" value="opt2" color="warning"></ds-select>
      </section>
    </main>

    <script>
      const commonOptions = [
        { label: 'Option 1', value: 'opt1' },
        { label: 'Option 2', value: 'opt2' },
        { label: 'Option 3', value: 'opt3' },
      ]

      const manyOptions = Array.from({ length: 10 }, (_, i) => ({
        label: `Option ${i + 1}`,
        value: `opt${i + 1}`,
      }))

      // Set options on all select elements
      document.querySelectorAll('ds-select').forEach(el => {
        if (el.id === 'slotted') {
          // Slotted options are defined in HTML, so skip
          return
        } else if (el.id === 'many-options') {
          el.options = manyOptions
        } else if (el.id === 'preselected') {
          el.options = commonOptions
          el.value = 'opt2'
        } else {
          el.options = commonOptions
        }
      })
    </script>
  </body>
</html>
