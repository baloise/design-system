<!doctype html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <link rel="stylesheet" href="/assets/section.css" />
    <link rel="stylesheet" href="/assets/styles/design-system.local.min.css" />

    <script type="module" src="/build/design-system.esm.js"></script>
    <script nomodule src="/build/design-system.js"></script>
  </head>

  <body>
    <main class="container">
      <!-- Basic -->
      <section data-testid="basic">
        <span>Basic</span>
        <ds-segment
          name="basic"
          value="apple"
          label="Fruits"
          description="Choose your favorite fruit"
          allow-empty-selection
        >
          <ds-segment-item value="apple" label="Apple"></ds-segment-item>
          <ds-segment-item value="strewberry" label="Strewberry"></ds-segment-item>
        </ds-segment>

        <button class="button" id="add-button">Add</button>
        <button class="button" id="remove-button">Remove</button>
        <button class="button" id="change-button">Change</button>
        <script>
          const addButton = document.getElementById('add-button')
          const removeButton = document.getElementById('remove-button')
          const changeButton = document.getElementById('change-button')
          const segment = document.querySelector('ds-segment[name="basic"]')
          addButton.addEventListener('click', () => {
            const newItem = document.createElement('ds-segment-item')
            newItem.setAttribute('value', 'banana')
            newItem.setAttribute('label', 'Banana')
            segment.appendChild(newItem)
          })
          removeButton.addEventListener('click', () => {
            const items = segment.querySelectorAll('ds-segment-item')
            if (items.length > 0) {
              segment.removeChild(items[items.length - 1])
            }
          })
          changeButton.addEventListener('click', () => {
            const items = segment.querySelectorAll('ds-segment-item')
            if (items.length > 0) {
              items[0].setAttribute('label', 'Changed Apple')
            }
          })
        </script>
      </section>

      <section data-testid="long-content">
        <span>Long-Content</span>
        <ds-segment name="long-content" value="apple" label="Fruits" description="Choose your favorite fruit">
          <ds-segment-item
            value="apple"
            label="Apple is a sweet red fruit that grows on trees and is enjoyed by many people around the world."
            description="A sweet red fruit"
          ></ds-segment-item>
          <ds-segment-item
            value="strewberry"
            label="Strewberry is a small red fruit that is often used in desserts and enjoyed by many people."
            description="A small red fruit"
          ></ds-segment-item>
        </ds-segment>
      </section>

      <section data-testid="description">
        <span>Description</span>
        <ds-segment name="description" value="apple" label="Fruits" description="Choose your favorite fruit">
          <ds-segment-item value="apple" label="Apple" description="A sweet red fruit"></ds-segment-item>
          <ds-segment-item value="strewberry" label="Strewberry" description="A small red fruit"></ds-segment-item>
        </ds-segment>
      </section>

      <!-- Vertical -->
      <section data-testid="vertical">
        <span>Vertical</span>
        <ds-segment name="vertical" value="apple" label="Fruits" description="Choose your favorite fruit" vertical>
          <ds-segment-item value="apple" label="Apple" description="A sweet red fruit"></ds-segment-item>
          <ds-segment-item value="strewberry" label="Strewberry" description="A small red fruit"></ds-segment-item>
        </ds-segment>
      </section>

      <!-- Disabled -->
      <section data-testid="disabled">
        <span>Disabled</span>
        <ds-segment name="disabled" value="apple" label="Fruits" description="Choose your favorite fruit" disabled>
          <ds-segment-item value="apple" label="Apple" description="A sweet red fruit"></ds-segment-item>
          <ds-segment-item value="strewberry" label="Strewberry" description="A small red fruit"></ds-segment-item>
        </ds-segment>
      </section>

      <!-- Invalid -->
      <section data-testid="invalid">
        <span>Invalid</span>
        <ds-segment
          name="invalid"
          value="apple"
          label="Fruits"
          description="Choose your favorite fruit"
          invalid
          invalid-text="Please select a fruit"
        >
          <ds-segment-item value="apple" label="Apple" description="A sweet red fruit"></ds-segment-item>
          <ds-segment-item value="strewberry" label="Strewberry" description="A small red fruit"></ds-segment-item>
        </ds-segment>
      </section>

      <!-- Invalid + Disabled -->
      <section data-testid="invalid-disabled">
        <span>Invalid + Disabled</span>
        <ds-segment
          name="invalid-disabled"
          value="apple"
          label="Fruits"
          description="Choose your favorite fruit"
          invalid
          invalid-text="Please select a fruit"
          disabled
        >
          <ds-segment-item value="apple" label="Apple" description="A sweet red fruit"></ds-segment-item>
          <ds-segment-item value="strewberry" label="Strewberry" description="A small red fruit"></ds-segment-item>
        </ds-segment>
      </section>

      <!-- Wide -->
      <section data-testid="wide">
        <span>Wide</span>
        <ds-segment wide name="heros-1" label="Label" description="Description" value="apple">
          <ds-segment-item value="apple" label="Apple" description="A sweet red fruit"></ds-segment-item>
          <ds-segment-item value="strewberry" label="Strewberry" description="A small red fruit"></ds-segment-item>
        </ds-segment>
      </section>

      <!-- Form submit -->
      <section data-testid="form">
        <span>Form</span>
        <form action="https://www.w3schools.com/action_page.php" target="_blank">
          <ds-segment name="heros-2" label="Label" description="Description" value="apple">
            <ds-segment-item value="apple" label="Apple" description="A sweet red fruit"></ds-segment-item>
            <ds-segment-item value="strewberry" label="Strewberry" description="A small red fruit"></ds-segment-item>
          </ds-segment>
          <br /><br />
          <ds-button element-type="submit" color="primary">Submit</ds-button>
          <ds-button element-type="reset" color="link">Reset</ds-button>
        </form>
      </section>
    </main>
  </body>
</html>
