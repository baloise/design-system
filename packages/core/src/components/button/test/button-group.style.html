<!doctype html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <link rel="stylesheet" href="/assets/section.css" />
    <link rel="stylesheet" href="/assets/styles/design-system.local.min.css" />

    <script type="module" src="/build/design-system.esm.js"></script>
    <script nomodule src="/build/design-system.js"></script>
  </head>
  <body>
    <main class="container">
      <!-- Basic Style -->
      <section data-testid="basic">
        <span>Basic</span>
        <div class="buttons">
          <button class="button">Button</button>
          <button class="button">Button</button>
          <button class="button">Button</button>
        </div>
      </section>

      <!-- Group -->
      <section data-testid="group">
        <span>Group</span>
        <div class="buttons">
          <button class="button">Left</button>
          <button class="button">Middle</button>
          <button class="button">Right</button>
        </div>
        <div class="buttons is-center">
          <button class="button">Left</button>
          <button class="button">Middle</button>
          <button class="button">Right</button>
        </div>
        <div class="buttons is-right">
          <button class="button">Left</button>
          <button class="button">Middle</button>
          <button class="button">Right</button>
        </div>
      </section>

      <!-- Long Labels -->
      <section data-testid="long-labels">
        <span>Long Labels</span>
        <div class="buttons">
          <button class="button">Left</button>
          <button class="button">Very long label for a simple button to see if it wraps</button>
          <button class="button">Right</button>
        </div>
      </section>

      <!-- Column Group -->
      <section data-testid="column-group">
        <span>Column Group</span>
        <div class="buttons as-col is-left">
          <button class="button">Left</button>
          <button class="button">Middle</button>
          <button class="button">Right</button>
        </div>
        <div class="buttons as-col is-center">
          <button class="button">Left</button>
          <button class="button">Middle</button>
          <button class="button">Right</button>
        </div>
        <div class="buttons as-col is-right">
          <button class="button">Left</button>
          <button class="button">Middle</button>
          <button class="button">Right</button>
        </div>
      </section>

      <!-- Expanded -->
      <section data-testid="expanded">
        <span>Expanded</span>
        <div class="buttons as-row is-expanded">
          <button class="button">Left</button>
          <button class="button">Right</button>
        </div>
        <div class="buttons as-row is-expanded">
          <button class="button is-square">
            <ds-icon name="plus"></ds-icon>
          </button>
          <button class="button">Right</button>
        </div>
      </section>

      <!-- Two Row Button Group -->
      <section data-testid="two-row-button-group">
        <span>Two Row Button Group</span>
        <div class="buttons as-row">
          <button class="button">Left</button>
          <button class="button">Right</button>
        </div>
        <div class="buttons as-row">
          <button class="button is-square">
            <ds-icon name="plus"></ds-icon>
          </button>
          <button class="button">Right</button>
        </div>
      </section>
    </main>
  </body>
</html>
