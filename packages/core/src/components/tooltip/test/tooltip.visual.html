<!doctype html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <link rel="stylesheet" href="/assets/section.css" />
    <link rel="stylesheet" href="/assets/css/design-system.local.min.css" />

    <script type="module" src="/build/design-system.esm.js"></script>
    <script nomodule src="/build/design-system.js"></script>
    <style>
      section {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 10rem;
        padding: 4rem;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <!-- Basic -->
      <section data-testid="basic">
        <span>Basic</span>
        <button id="tooltip-basic" type="button">Hover over me</button>
        <ds-tooltip reference="tooltip-basic" open>Tooltip content</ds-tooltip>
      </section>

      <!-- Placement: top -->
      <section data-testid="placement-top">
        <span>Placement top</span>
        <button id="tooltip-top" type="button">Trigger</button>
        <ds-tooltip reference="tooltip-top" placement="top" open>Tooltip top</ds-tooltip>
      </section>

      <!-- Placement: right -->
      <section data-testid="placement-right">
        <span>Placement right</span>
        <button id="tooltip-right" type="button">Trigger</button>
        <ds-tooltip reference="tooltip-right" placement="right" open>Tooltip right</ds-tooltip>
      </section>

      <!-- Placement: bottom -->
      <section data-testid="placement-bottom">
        <span>Placement bottom</span>
        <button id="tooltip-bottom" type="button">Trigger</button>
        <ds-tooltip reference="tooltip-bottom" placement="bottom" open>Tooltip bottom</ds-tooltip>
      </section>

      <!-- Placement: left -->
      <section data-testid="placement-left">
        <span>Placement left</span>
        <button id="tooltip-left" type="button">Trigger</button>
        <ds-tooltip reference="tooltip-left" placement="left" open>Tooltip left</ds-tooltip>
      </section>

      <!-- Content width -->
      <section data-testid="content-width">
        <span>Content width</span>
        <button id="tooltip-width" type="button">Trigger</button>
        <ds-tooltip reference="tooltip-width" content-width="200" open
          >Long tooltip content that wraps to multiple lines when constrained.</ds-tooltip
        >
      </section>
    </main>
  </body>
</html>
