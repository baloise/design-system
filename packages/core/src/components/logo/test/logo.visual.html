<!doctype html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <link rel="stylesheet" href="/assets/section.css" />
    <link rel="stylesheet" href="/assets/styles/design-system.local.min.css" />

    <script type="module" src="/build/design-system.esm.js"></script>
    <script nomodule src="/build/design-system.js"></script>
  </head>

  <body>
    <ds-app>
      <main class="container py-medium">
        <section data-testid="basic">
          <span>Basic</span>
          <ds-logo></ds-logo>
        </section>

        <section data-testid="sizes">
          <span>Sizes</span>
          <ds-logo size="small"></ds-logo>
        </section>

        <section data-testid="inverted" class="s-bg-inverted">
          <span>Inverted</span>
          <ds-logo color="white"> </ds-logo>
        </section>

        <section>
          <span>Animated</span>
          <ds-logo animated size="small"></ds-logo>
          <ds-logo animated></ds-logo>
        </section>

        <hr />

        <section data-testid="basic-baloise">
          <span>Basic</span>
          <ds-logo brand="baloise"></ds-logo>
        </section>

        <section data-testid="sizes-baloise">
          <span>Sizes</span>
          <ds-logo brand="baloise" size="small"></ds-logo>
        </section>

        <section data-testid="inverted-baloise" class="s-bg-inverted">
          <span>Inverted</span>
          <ds-logo brand="baloise" color="white"> </ds-logo>
        </section>

        <section>
          <span>Animated</span>
          <ds-logo brand="baloise" animated size="small"></ds-logo>
          <ds-logo brand="baloise" animated></ds-logo>
        </section>
      </main>
    </ds-app>
  </body>
</html>
