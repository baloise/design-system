<!doctype html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <link rel="stylesheet" href="/assets/section.css" />
    <link rel="stylesheet" href="/assets/styles/design-system.local.min.css" />
  </head>

  <body>
    <main class="container">
      <!-- Basic -->
      <section data-testid="basic">
        <span>Basic</span>
        <label class="radio">
          <input type="radio" />
          Unchecked
        </label>
        <label class="radio">
          <input type="radio" checked />
          Checked
        </label>
      </section>

      <!-- No label -->
      <section data-testid="no-label">
        <span>No Label</span>
        <label class="radio">
          <input type="radio" />
        </label>
        <label class="radio">
          <input type="radio" checked />
        </label>
      </section>

      <!-- Disabled -->
      <section data-testid="disabled">
        <span>Disabled</span>
        <label class="radio is-disabled">
          <input type="radio" disabled />
          Unchecked
        </label>
        <label class="radio is-disabled">
          <input type="radio" checked disabled />
          Checked
        </label>
      </section>

      <!-- Invalid -->
      <section data-testid="invalid">
        <span>Invalid</span>
        <label class="radio is-invalid">
          <input type="radio" />
          Unchecked
        </label>
        <label class="radio is-invalid">
          <input type="radio" checked />
          Checked
        </label>
      </section>

      <!-- Invalid + Disabled -->
      <section data-testid="invalid-disabled">
        <span>Invalid + Disabled</span>
        <label class="radio is-invalid is-disabled">
          <input type="radio" disabled />
          Unchecked
        </label>
        <label class="radio is-invalid is-disabled">
          <input type="radio" checked disabled />
          Checked
        </label>
      </section>

      <!-- Field -->
      <section data-testid="field">
        <span>Field</span>
        <fieldset class="field">
          <legend class="label">Label</legend>
          <div class="radio-group">
            <label class="radio">
              <input required type="radio" name="required" aria-describedby="help" />
              Radio 1
            </label>
            <label class="radio">
              <input required type="radio" name="required" aria-describedby="help" />
              Radio 2
            </label>
          </div>
          <p class="help" id="help">This username is available</p>
        </fieldset>
      </section>

      <!-- Field Vertical -->
      <section data-testid="field-vertical">
        <span>Field Vertical</span>
        <fieldset class="field">
          <legend class="label">Label</legend>
          <div class="radio-group is-vertical">
            <label class="radio">
              <input required type="radio" name="required" aria-describedby="help" />
              Radio 1
            </label>
            <label class="radio">
              <input required type="radio" name="required" aria-describedby="help" />
              Radio 2
            </label>
          </div>

          <p class="help" id="help">This username is available</p>
        </fieldset>
      </section>

      <!-- Form submit -->
      <section data-testid="form">
        <span>Form</span>
        <form action="https://www.w3schools.com/action_page.php" target="_blank">
          <label class="radio">
            <input type="radio" name="terms" value="accepted" />
            Accept terms and conditions
          </label>
          <br /><br />
          <button type="submit">Submit</button>
          <button type="reset">Reset</button>
        </form>
      </section>

      <!-- Field Disabled -->
      <section data-testid="field-disabled">
        <span>Field Disabled</span>
        <fieldset class="field is-disabled">
          <legend class="label">Label</legend>
          <div class="radio-group">
            <label class="radio is-disabled">
              <input type="radio" name="field-disabled" disabled aria-describedby="help" />
              Radio 1
            </label>
            <label class="radio is-disabled">
              <input type="radio" name="field-disabled" disabled aria-describedby="help" />
              Radio 2
            </label>
          </div>
          <p class="help" id="help">This username is available</p>
        </fieldset>
      </section>

      <!-- Field Invalid -->
      <section data-testid="field-invalid">
        <span>Field Invalid</span>
        <fieldset class="field is-invalid">
          <legend class="label">Label</legend>
          <div class="radio-group">
            <label class="radio is-invalid">
              <input type="radio" name="field-invalid" aria-invalid="true" aria-describedby="help" />
              Radio 1
            </label>
            <label class="radio is-invalid">
              <input type="radio" name="field-invalid" aria-invalid="true" aria-describedby="help" />
              Radio 2
            </label>
          </div>
          <p class="help" id="help">This username is available</p>
        </fieldset>
      </section>
    </main>
  </body>
</html>
