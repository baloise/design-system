<!doctype html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <link rel="stylesheet" href="/assets/section.css" />
    <link rel="stylesheet" href="/assets/styles/baloise-design-system.local.min.css" />

    <script type="module" src="/build/baloise-design-system.esm.js"></script>
    <script nomodule src="/build/baloise-design-system.js"></script>

    <script type="module">
      import { balToastController, balSnackbarController } from '/build/index.esm.js'

      window.balToastController = balToastController
      window.balSnackbarController = balSnackbarController
    </script>
  </head>
  <body>
    <main class="container">
      <!-- Toast -->
      <section>
        <span>Toast</span>
        <bal-button id="toast-default" color="success" data-testid="toast">Show success Toast</bal-button>
        <bal-button id="toast-warning" color="warning" data-testid="toast-warning">Show warning Toast</bal-button>
        <script>
          document.getElementById('toast-default').onclick = function () {
            balToastController.create({
              message: 'Hi I am a default Toast! Hi I am a default Toast!',
              color: 'success',
              duration: 0,
            })
          }
          document.getElementById('toast-warning').onclick = function () {
            const toast = balToastController.create({
              heading: 'Warning!',
              message: 'Warning!',
              action: 'Undo',
              color: 'warning',
            })
            setTimeout(() => toast.close, 2000)
          }
        </script>
      </section>

      <!-- Snackbar -->
      <section>
        <span>Snackbar</span>
        <bal-button data-testid="snackbar" id="snackbar-default" color="success">Show success Snackbar</bal-button>
        <bal-button data-testid="snackbar-warning" id="snackbar-warning" color="warning">
          Show warning Snackbar
        </bal-button>
        <script>
          document.getElementById('snackbar-default').onclick = function () {
            balSnackbarController.create({
              message: 'Hi I am a default Snackbar! Hi I am a default Snackbar!',
              color: 'success',
              duration: 1000,
            })
          }
          document.getElementById('snackbar-warning').onclick = function () {
            const snackbar = balSnackbarController.create({
              heading: 'Warning!',
              message: 'Hi I am a warning Snackbar!',
              action: 'Undo',
              color: 'warning',
            })
            setTimeout(() => snackbar.close, 2000)
          }
        </script>
      </section>
    </main>
  </body>
</html>
