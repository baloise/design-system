<!doctype html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <link rel="stylesheet" href="/assets/section.css" />
    <link rel="stylesheet" href="/assets/styles/design-system.local.min.css" />
    <script type="module" src="/build/design-system.esm.js"></script>
    <script nomodule src="/build/design-system.js"></script>
  </head>
  <body>
    <main class="container">
      <!-- Basic -->
      <section data-testid="basic">
        <span>Basic</span>
        <div class="field">
          <label class="label" for="textarea-basic-1">Label</label>
          <div class="control">
            <textarea id="textarea-basic-1" class="textarea" aria-describedby="help-basic-1"></textarea>
          </div>
          <p id="help-basic-1" class="help">Description</p>
        </div>
        <div class="field">
          <label class="label" for="textarea-basic-2">Label</label>
          <div class="control">
            <textarea
              id="textarea-basic-2"
              class="textarea"
              placeholder="Placeholder"
              aria-describedby="help-basic-2"
            ></textarea>
          </div>
          <p id="help-basic-2" class="help">Description</p>
        </div>
        <div class="field">
          <label class="label" for="textarea-basic-3">Label</label>
          <div class="control">
            <textarea id="textarea-basic-3" class="textarea" aria-describedby="help-basic-3">Value</textarea>
          </div>
          <p id="help-basic-3" class="help">Description</p>
        </div>
      </section>

      <!-- Disabled -->
      <section data-testid="disabled">
        <span>Disabled</span>
        <div class="field is-disabled">
          <label class="label" for="textarea-disabled-1">Label</label>
          <div class="control">
            <textarea id="textarea-disabled-1" class="textarea" disabled aria-describedby="help-disabled-1"></textarea>
          </div>
          <p id="help-disabled-1" class="help">Description</p>
        </div>
        <div class="field is-disabled">
          <label class="label" for="textarea-disabled-2">Label</label>
          <div class="control">
            <textarea
              id="textarea-disabled-2"
              class="textarea"
              placeholder="Placeholder"
              disabled
              aria-describedby="help-disabled-2"
            ></textarea>
          </div>
          <p id="help-disabled-2" class="help">Description</p>
        </div>
        <div class="field is-disabled">
          <label class="label" for="textarea-disabled-3">Label</label>
          <div class="control">
            <textarea id="textarea-disabled-3" class="textarea" disabled aria-describedby="help-disabled-3">
Value</textarea
            >
          </div>
          <p id="help-disabled-3" class="help">Description</p>
        </div>
      </section>

      <!-- Invalid -->
      <section data-testid="invalid">
        <span>Invalid</span>
        <div class="field is-danger">
          <label class="label" for="textarea-invalid-1">Label</label>
          <div class="control">
            <textarea
              id="textarea-invalid-1"
              class="textarea"
              aria-invalid="true"
              aria-describedby="help-invalid-1"
            ></textarea>
          </div>
          <p id="help-invalid-1" class="help">Validation Error</p>
        </div>
        <div class="field is-danger">
          <label class="label" for="textarea-invalid-2">Label</label>
          <div class="control">
            <textarea
              id="textarea-invalid-2"
              class="textarea"
              placeholder="Placeholder"
              aria-invalid="true"
              aria-describedby="help-invalid-2"
            ></textarea>
          </div>
          <p id="help-invalid-2" class="help">Validation Error</p>
        </div>
        <div class="field is-danger">
          <label class="label" for="textarea-invalid-3">Label</label>
          <div class="control">
            <textarea id="textarea-invalid-3" class="textarea" aria-invalid="true" aria-describedby="help-invalid-3">
Value</textarea
            >
          </div>
          <p id="help-invalid-3" class="help">Validation Error</p>
        </div>
      </section>

      <!-- Valid -->
      <section data-testid="valid">
        <span>Valid</span>
        <div class="field is-success">
          <label class="label" for="textarea-valid-1">Label</label>
          <div class="control">
            <textarea id="textarea-valid-1" class="textarea" aria-describedby="help-valid-1"></textarea>
          </div>
          <p id="help-valid-1" class="help">Description</p>
        </div>
      </section>

      <!-- Warning -->
      <section data-testid="warning">
        <span>Warning</span>
        <div class="field is-warning">
          <label class="label" for="textarea-warning-1">Label</label>
          <div class="control">
            <textarea id="textarea-warning-1" class="textarea" aria-describedby="help-warning-1"></textarea>
          </div>
          <p id="help-warning-1" class="help">Description</p>
        </div>
      </section>
    </main>
  </body>
</html>
