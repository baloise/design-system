<!doctype html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <link rel="stylesheet" href="/assets/section.css" />
    <link rel="stylesheet" href="/assets/styles/baloise-design-system.local.min.css" />

    <script type="module" src="/build/baloise-design-system.esm.js"></script>
    <script nomodule src="/build/baloise-design-system.js"></script>
  </head>
  <body>
    <main class="container">
      <!-- Basic Style -->
      <section data-testid="basic">
        <span>Basic</span>
        <hr />
        <br />
        <br />
        <hr class="divider" />
      </section>

      <!-- Colors -->
      <section data-testid="colors">
        <span>Colors</span>
        <hr class="divider has-space-sm is-primary" />
        <hr class="divider has-space-sm is-primary-light" />
        <hr class="divider has-space-sm is-primary-dark" />
        <hr class="divider has-space-sm is-grey-light" />
        <hr class="divider has-space-sm is-grey" />
        <hr class="divider has-space-sm is-grey-dark" />
        <hr class="divider has-space-sm is-warning" />
        <hr class="divider has-space-sm is-success" />
        <hr class="divider has-space-sm is-danger" />
        <hr class="divider has-space-sm is-danger-dark" />
        <hr class="divider has-space-sm is-danger-darker" />
        <hr class="divider has-space-sm is-white" />
        <hr class="divider has-space-sm is-light-blue" />
      </section>

      <!-- Dashed -->
      <section data-testid="dashed">
        <span>Dashed</span>
        <hr class="divider has-space-sm is-dashed is-primary" />
        <hr class="divider has-space-sm is-dashed is-primary-light" />
        <hr class="divider has-space-sm is-dashed is-primary-dark" />
        <hr class="divider has-space-sm is-dashed is-grey-light" />
        <hr class="divider has-space-sm is-dashed is-grey" />
        <hr class="divider has-space-sm is-dashed is-grey-dark" />
        <hr class="divider has-space-sm is-dashed is-warning" />
        <hr class="divider has-space-sm is-dashed is-success" />
        <hr class="divider has-space-sm is-dashed is-danger" />
        <hr class="divider has-space-sm is-dashed is-danger-dark" />
        <hr class="divider has-space-sm is-dashed is-danger-darker" />
        <hr class="divider has-space-sm is-dashed is-white" />
        <hr class="divider has-space-sm is-dashed is-light-blue" />
      </section>

      <section data-testid="dashed-vertical" style="display: flex; height: 8rem">
        <span>Dashed Vertical</span>
        <hr class="divider has-space-sm is-vertical is-dashed is-primary" />
        <hr class="divider has-space-sm is-vertical is-dashed is-primary-light" />
        <hr class="divider has-space-sm is-vertical is-dashed is-primary-dark" />
        <hr class="divider has-space-sm is-vertical is-dashed is-grey-light" />
        <hr class="divider has-space-sm is-vertical is-dashed is-grey" />
        <hr class="divider has-space-sm is-vertical is-dashed is-grey-dark" />
        <hr class="divider has-space-sm is-vertical is-dashed is-warning" />
        <hr class="divider has-space-sm is-vertical is-dashed is-success" />
        <hr class="divider has-space-sm is-vertical is-dashed is-danger" />
        <hr class="divider has-space-sm is-vertical is-dashed is-danger-dark" />
        <hr class="divider has-space-sm is-vertical is-dashed is-danger-darker" />
        <hr class="divider has-space-sm is-vertical is-dashed is-white" />
        <hr class="divider has-space-sm is-vertical is-dashed is-light-blue" />
      </section>

      <!-- Horizontal -->
      <section data-testid="horizontal">
        <span>Horizontal</span>
        <hr class="divider is-horizontal" />

        <hr class="divider is-horizontal has-space-none" />
        <hr class="divider is-horizontal has-space-sxs" />
        <hr class="divider is-horizontal has-space-xs" />
        <hr class="divider is-horizontal has-space-sm" />
        <hr class="divider is-horizontal has-space-base" />
        <hr class="divider is-horizontal has-space-md" />
        <hr class="divider is-horizontal has-space-lg" />
        <hr class="divider is-horizontal has-space-xl" />
        <hr class="divider is-horizontal has-space-2xl" />
        <hr class="divider is-horizontal has-space-3xl" />
      </section>

      <!-- Vertical -->
      <section data-testid="vertical" style="display: flex; height: 8rem">
        <span>Vertical</span>
        <hr class="divider is-vertical" />

        <hr class="divider is-vertical has-space-none" />
        <hr class="divider is-vertical has-space-2xs" />
        <hr class="divider is-vertical has-space-xs" />
        <hr class="divider is-vertical has-space-sm" />
        <hr class="divider is-vertical has-space-base" />
        <hr class="divider is-vertical has-space-md" />
        <hr class="divider is-vertical has-space-lg" />
        <hr class="divider is-vertical has-space-xl" />
        <hr class="divider is-vertical has-space-2xl" />
        <hr class="divider is-vertical has-space-3xl" />
      </section>
    </main>
  </body>
</html>
