<!doctype html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <link rel="stylesheet" href="/assets/section.css" />
    <link rel="stylesheet" href="/assets/styles/design-system.local.min.css" />

    <script type="module" src="/build/design-system.esm.js"></script>
    <script nomodule src="/build/design-system.js"></script>
  </head>
  <body>
    <main class="container">
      <!-- Basic Style -->
      <section data-testid="basic">
        <span>Basic</span>
        <ds-divider></ds-divider>
      </section>

      <!-- Colors -->
      <section data-testid="colors">
        <span>Colors</span>
        <ds-divider space="sm" color="primary"></ds-divider>
        <ds-divider space="sm" color="primary-light"></ds-divider>
        <ds-divider space="sm" color="primary-dark"></ds-divider>
        <ds-divider space="sm" color="grey-light"></ds-divider>
        <ds-divider space="sm" color="grey"></ds-divider>
        <ds-divider space="sm" color="grey-dark"></ds-divider>
        <ds-divider space="sm" color="warning"></ds-divider>
        <ds-divider space="sm" color="success"></ds-divider>
        <ds-divider space="sm" color="danger"></ds-divider>
        <ds-divider space="sm" color="danger-dark"></ds-divider>
        <ds-divider space="sm" color="danger-darker"></ds-divider>
        <ds-divider space="sm" color="white"></ds-divider>
        <ds-divider space="sm" color="light-blue"></ds-divider>
      </section>

      <!-- Dashed -->
      <section data-testid="dashed">
        <span>Dashed</span>
        <ds-divider space="sm" color="primary" dashed></ds-divider>
        <ds-divider space="sm" color="primary-light" dashed></ds-divider>
        <ds-divider space="sm" color="primary-dark" dashed></ds-divider>
        <ds-divider space="sm" color="grey-light" dashed></ds-divider>
        <ds-divider space="sm" color="grey" dashed></ds-divider>
        <ds-divider space="sm" color="grey-dark" dashed></ds-divider>
        <ds-divider space="sm" color="warning" dashed></ds-divider>
        <ds-divider space="sm" color="success" dashed></ds-divider>
        <ds-divider space="sm" color="danger" dashed></ds-divider>
        <ds-divider space="sm" color="danger-dark" dashed></ds-divider>
        <ds-divider space="sm" color="danger-darker" dashed></ds-divider>
        <ds-divider space="sm" color="white" dashed></ds-divider>
        <ds-divider space="sm" color="light-blue" dashed></ds-divider>
      </section>

      <section data-testid="dashed-vertical" style="display: flex; height: 8rem">
        <span>Dashed Vertical</span>
        <ds-divider space="sm" color="primary" dashed layout="vertical"></ds-divider>
        <ds-divider space="sm" color="primary-light" dashed layout="vertical"></ds-divider>
        <ds-divider space="sm" color="primary-dark" dashed layout="vertical"></ds-divider>
        <ds-divider space="sm" color="grey-light" dashed layout="vertical"></ds-divider>
        <ds-divider space="sm" color="grey" dashed layout="vertical"></ds-divider>
        <ds-divider space="sm" color="grey-dark" dashed layout="vertical"></ds-divider>
        <ds-divider space="sm" color="warning" dashed layout="vertical"></ds-divider>
        <ds-divider space="sm" color="success" dashed layout="vertical"></ds-divider>
        <ds-divider space="sm" color="danger" dashed layout="vertical"></ds-divider>
        <ds-divider space="sm" color="danger-dark" dashed layout="vertical"></ds-divider>
        <ds-divider space="sm" color="danger-darker" dashed layout="vertical"></ds-divider>
        <ds-divider space="sm" color="white" dashed layout="vertical"></ds-divider>
        <ds-divider space="sm" color="light-blue" dashed layout="vertical"></ds-divider>
      </section>

      <!-- Horizontal -->
      <section data-testid="horizontal">
        <span>Horizontal</span>
        <ds-divider layout="horizontal"></ds-divider>
        <ds-divider layout="horizontal" space="none"></ds-divider>
        <ds-divider layout="horizontal" space="2xs"></ds-divider>
        <ds-divider layout="horizontal" space="xs"></ds-divider>
        <ds-divider layout="horizontal" space="sm"></ds-divider>
        <ds-divider layout="horizontal" space="base"></ds-divider>
        <ds-divider layout="horizontal" space="md"></ds-divider>
        <ds-divider layout="horizontal" space="lg"></ds-divider>
        <ds-divider layout="horizontal" space="xl"></ds-divider>
        <ds-divider layout="horizontal" space="2xl"></ds-divider>
        <ds-divider layout="horizontal" space="3xl"></ds-divider>
      </section>

      <!-- Vertical -->
      <section data-testid="vertical" style="display: flex; height: 8rem">
        <span>Vertical</span>
        <ds-divider layout="vertical"></ds-divider>
        <ds-divider layout="vertical" space="none"></ds-divider>
        <ds-divider layout="vertical" space="2xs"></ds-divider>
        <ds-divider layout="vertical" space="xs"></ds-divider>
        <ds-divider layout="vertical" space="sm"></ds-divider>
        <ds-divider layout="vertical" space="base"></ds-divider>
        <ds-divider layout="vertical" space="md"></ds-divider>
        <ds-divider layout="vertical" space="lg"></ds-divider>
        <ds-divider layout="vertical" space="xl"></ds-divider>
        <ds-divider layout="vertical" space="2xl"></ds-divider>
        <ds-divider layout="vertical" space="3xl"></ds-divider>
      </section>
    </main>
  </body>
</html>
