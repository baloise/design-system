<!doctype html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <link rel="stylesheet" href="/assets/section.css" />
    <link rel="stylesheet" href="/assets/styles/baloise-design-system.local.min.css" />

    <script type="module" src="/build/baloise-design-system.esm.js"></script>
    <script nomodule src="/build/baloise-design-system.js"></script>
  </head>
  <body>
    <main class="container">
      <!-- Basic Style -->
      <section data-testid="basic">
        <span>Basic</span>
        <bal-divider></bal-divider>
      </section>

      <!-- Colors -->
      <section data-testid="colors">
        <span>Colors</span>
        <bal-divider space="sm" color="primary"></bal-divider>
        <bal-divider space="sm" color="primary-light"></bal-divider>
        <bal-divider space="sm" color="primary-dark"></bal-divider>
        <bal-divider space="sm" color="grey-light"></bal-divider>
        <bal-divider space="sm" color="grey"></bal-divider>
        <bal-divider space="sm" color="grey-dark"></bal-divider>
        <bal-divider space="sm" color="warning"></bal-divider>
        <bal-divider space="sm" color="success"></bal-divider>
        <bal-divider space="sm" color="danger"></bal-divider>
        <bal-divider space="sm" color="danger-dark"></bal-divider>
        <bal-divider space="sm" color="danger-darker"></bal-divider>
        <bal-divider space="sm" color="white"></bal-divider>
        <bal-divider space="sm" color="light-blue"></bal-divider>
      </section>

      <!-- Dashed -->
      <section data-testid="dashed">
        <span>Dashed</span>
        <bal-divider space="sm" color="primary" dashed></bal-divider>
        <bal-divider space="sm" color="primary-light" dashed></bal-divider>
        <bal-divider space="sm" color="primary-dark" dashed></bal-divider>
        <bal-divider space="sm" color="grey-light" dashed></bal-divider>
        <bal-divider space="sm" color="grey" dashed></bal-divider>
        <bal-divider space="sm" color="grey-dark" dashed></bal-divider>
        <bal-divider space="sm" color="warning" dashed></bal-divider>
        <bal-divider space="sm" color="success" dashed></bal-divider>
        <bal-divider space="sm" color="danger" dashed></bal-divider>
        <bal-divider space="sm" color="danger-dark" dashed></bal-divider>
        <bal-divider space="sm" color="danger-darker" dashed></bal-divider>
        <bal-divider space="sm" color="white" dashed></bal-divider>
        <bal-divider space="sm" color="light-blue" dashed></bal-divider>
      </section>

      <section data-testid="dashed-vertical" style="display: flex; height: 8rem">
        <span>Dashed Vertical</span>
        <bal-divider space="sm" color="primary" dashed layout="vertical"></bal-divider>
        <bal-divider space="sm" color="primary-light" dashed layout="vertical"></bal-divider>
        <bal-divider space="sm" color="primary-dark" dashed layout="vertical"></bal-divider>
        <bal-divider space="sm" color="grey-light" dashed layout="vertical"></bal-divider>
        <bal-divider space="sm" color="grey" dashed layout="vertical"></bal-divider>
        <bal-divider space="sm" color="grey-dark" dashed layout="vertical"></bal-divider>
        <bal-divider space="sm" color="warning" dashed layout="vertical"></bal-divider>
        <bal-divider space="sm" color="success" dashed layout="vertical"></bal-divider>
        <bal-divider space="sm" color="danger" dashed layout="vertical"></bal-divider>
        <bal-divider space="sm" color="danger-dark" dashed layout="vertical"></bal-divider>
        <bal-divider space="sm" color="danger-darker" dashed layout="vertical"></bal-divider>
        <bal-divider space="sm" color="white" dashed layout="vertical"></bal-divider>
        <bal-divider space="sm" color="light-blue" dashed layout="vertical"></bal-divider>
      </section>

      <!-- Horizontal -->
      <section data-testid="horizontal">
        <span>Horizontal</span>
        <bal-divider layout="horizontal"></bal-divider>
        <bal-divider layout="horizontal" space="none"></bal-divider>
        <bal-divider layout="horizontal" space="2xs"></bal-divider>
        <bal-divider layout="horizontal" space="xs"></bal-divider>
        <bal-divider layout="horizontal" space="sm"></bal-divider>
        <bal-divider layout="horizontal" space="base"></bal-divider>
        <bal-divider layout="horizontal" space="md"></bal-divider>
        <bal-divider layout="horizontal" space="lg"></bal-divider>
        <bal-divider layout="horizontal" space="xl"></bal-divider>
        <bal-divider layout="horizontal" space="2xl"></bal-divider>
        <bal-divider layout="horizontal" space="3xl"></bal-divider>
      </section>

      <!-- Vertical -->
      <section data-testid="vertical" style="display: flex; height: 8rem">
        <span>Vertical</span>
        <bal-divider layout="vertical"></bal-divider>
        <bal-divider layout="vertical" space="none"></bal-divider>
        <bal-divider layout="vertical" space="2xs"></bal-divider>
        <bal-divider layout="vertical" space="xs"></bal-divider>
        <bal-divider layout="vertical" space="sm"></bal-divider>
        <bal-divider layout="vertical" space="base"></bal-divider>
        <bal-divider layout="vertical" space="md"></bal-divider>
        <bal-divider layout="vertical" space="lg"></bal-divider>
        <bal-divider layout="vertical" space="xl"></bal-divider>
        <bal-divider layout="vertical" space="2xl"></bal-divider>
        <bal-divider layout="vertical" space="3xl"></bal-divider>
      </section>
    </main>
  </body>
</html>
