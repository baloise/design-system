<!doctype html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <link rel="stylesheet" href="/assets/section.css" />
    <link rel="stylesheet" href="/assets/styles/components/all.min.css" />
    <link rel="stylesheet" href="/assets/styles/baloise-design-system.local.min.css" />

    <script type="module" src="/build/baloise-design-system.esm.js"></script>
    <script nomodule src="/build/baloise-design-system.js"></script>
  </head>

  <body>
    <bal-doc-app>
      <main class="container py-medium">
        <bal-stack>
          <bal-button data-testid="basic-trigger" id="basic-tooltip">Basic</bal-button>
          <bal-button data-testid="placement-right-trigger" id="placement-right-tooltip">Right</bal-button>
        </bal-stack>

        <bal-tooltip data-testid="basic" label="Basic Tooltip" reference="basic-tooltip">
          <p>Basic Tooltip</p>
        </bal-tooltip>

        <bal-tooltip
          data-testid="placement-right"
          label="Placement Right"
          reference="placement-right-tooltip"
          placement="right"
        >
          <p>Tooltip right placement</p>
        </bal-tooltip>
      </main>
    </bal-doc-app>
  </body>
</html>
