<!doctype html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <link rel="stylesheet" href="/assets/section.css" />
    <link rel="stylesheet" href="/assets/styles/design-system.local.min.css" />

    <script type="module" src="/build/design-system.esm.js"></script>
    <script nomodule src="/build/design-system.js"></script>
  </head>

  <body>
    <main class="container">
      <section data-testid="basic">
        <span>Basic</span>
        <bal-check></bal-check>
        <bal-check checked></bal-check>
      </section>

      <section data-testid="disabled">
        <span>Disabled</span>
        <bal-check disabled></bal-check>
        <bal-check checked disabled></bal-check>
      </section>

      <section data-testid="invalid">
        <span>Invalid</span>
        <bal-check invalid></bal-check>
        <bal-check checked invalid></bal-check>
      </section>

      <section data-testid="inverted" class="s-bg-inverted">
        <span>Inverted</span>
        <bal-check inverted></bal-check>
        <bal-check checked inverted></bal-check>
      </section>
    </main>
  </body>
</html>
