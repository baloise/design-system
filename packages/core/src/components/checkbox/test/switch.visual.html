<!doctype html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <link rel="stylesheet" href="/assets/section.css" />
    <link rel="stylesheet" href="/assets/styles/design-system.local.min.css" />

    <script type="module" src="/build/design-system.esm.js"></script>
    <script nomodule src="/build/design-system.js"></script>
  </head>

  <body>
    <main class="container">
      <section data-testid="basic">
        <span>Basic</span>
        <ds-switch></ds-switch>
        <ds-switch checked></ds-switch>
        <ds-switch checked="true"></ds-switch>
        <ds-switch checked="false"></ds-switch>
      </section>

      <section data-testid="invalid">
        <span>Invalid</span>
        <ds-switch invalid></ds-switch>
        <ds-switch invalid checked></ds-switch>
      </section>

      <section data-testid="disabled">
        <span>Disabled</span>
        <ds-switch disabled></ds-switch>
        <ds-switch disabled checked></ds-switch>
      </section>
    </main>
  </body>
</html>
