<!doctype html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <link rel="stylesheet" href="/assets/section.css" />
    <link rel="stylesheet" href="/assets/styles/design-system.local.min.css" />

    <script type="module" src="/build/design-system.esm.js"></script>
    <script nomodule src="/build/design-system.js"></script>
  </head>

  <body>
    <main class="container">
      <section data-testid="basic">
        <span>Basic</span>
        <bal-shape></bal-shape>
      </section>

      <!-- Colors -->
      <section data-testid="colors" class="flex flex-direction-row gap-small">
        <span>Colors</span>
        <bal-shape color="green"></bal-shape>
        <bal-shape color="green-light"></bal-shape>
        <bal-shape color="purple"></bal-shape>
        <bal-shape color="purple-light"></bal-shape>
        <bal-shape color="red"></bal-shape>
        <bal-shape color="red-light"></bal-shape>
        <bal-shape color="yellow"></bal-shape>
        <bal-shape color="yellow-light"></bal-shape>
      </section>

      <!-- Variation 1 -->
      <section data-testid="variation-1" class="flex flex-direction-row justify-content-space-between">
        <span>Variation 1</span>
        <bal-shape variation="1" rotation="0"></bal-shape>
        <bal-shape variation="1" rotation="180"></bal-shape>
        <bal-shape variation="1" rotation="270"></bal-shape>
        <bal-shape variation="1" rotation="90"></bal-shape>
      </section>

      <!-- Variation 2 -->
      <section data-testid="variation-2" class="flex flex-direction-row justify-content-space-between">
        <span>Variation 2</span>
        <bal-shape variation="2" rotation="0"></bal-shape>
        <bal-shape variation="2" rotation="180"></bal-shape>
        <bal-shape variation="2" rotation="270"></bal-shape>
        <bal-shape variation="2" rotation="90"></bal-shape>
      </section>

      <!-- Variation 3 -->
      <section data-testid="variation-3" class="flex flex-direction-row justify-content-space-between">
        <span>Variation 3</span>
        <bal-shape variation="3" rotation="0"></bal-shape>
        <bal-shape variation="3" rotation="180"></bal-shape>
        <bal-shape variation="3" rotation="270"></bal-shape>
        <bal-shape variation="3" rotation="90"></bal-shape>
      </section>
    </main>
  </body>
</html>
