<!doctype html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <link rel="stylesheet" href="/assets/section.css" />
    <link rel="stylesheet" href="/assets/tokens.css" />
    <link rel="stylesheet" href="/assets/basic.css" />
    <link rel="stylesheet" href="/assets/components.css" />

    <script type="module" src="/build/baloise-design-system.esm.js"></script>
    <script nomodule src="/build/baloise-design-system.js"></script>
  </head>
  <body>
    <main class="container">
      <!-- Basic Style -->
      <section>
        <span>Basic</span>
        <hr />
        <br />
        <br />
        <hr class="divider" />
      </section>

      <!-- Colors -->
      <section>
        <span>Colors</span>
        <hr class="divider has-space-small is-primary" />
        <hr class="divider has-space-small is-primary-light" />
        <hr class="divider has-space-small is-primary-dark" />
        <hr class="divider has-space-small is-grey-light" />
        <hr class="divider has-space-small is-grey" />
        <hr class="divider has-space-small is-grey-dark" />
        <hr class="divider has-space-small is-warning" />
        <hr class="divider has-space-small is-success" />
        <hr class="divider has-space-small is-danger" />
        <hr class="divider has-space-small is-danger-dark" />
        <hr class="divider has-space-small is-danger-darker" />
        <hr class="divider has-space-small is-white" />
        <hr class="divider has-space-small is-light-blue" />
      </section>

      <!-- Dashed -->
      <section>
        <span>Dashed</span>
        <hr class="divider has-space-small is-dashed is-primary" />
        <hr class="divider has-space-small is-dashed is-primary-light" />
        <hr class="divider has-space-small is-dashed is-primary-dark" />
        <hr class="divider has-space-small is-dashed is-grey-light" />
        <hr class="divider has-space-small is-dashed is-grey" />
        <hr class="divider has-space-small is-dashed is-grey-dark" />
        <hr class="divider has-space-small is-dashed is-warning" />
        <hr class="divider has-space-small is-dashed is-success" />
        <hr class="divider has-space-small is-dashed is-danger" />
        <hr class="divider has-space-small is-dashed is-danger-dark" />
        <hr class="divider has-space-small is-dashed is-danger-darker" />
        <hr class="divider has-space-small is-dashed is-white" />
        <hr class="divider has-space-small is-dashed is-light-blue" />
      </section>

      <!-- Horizontal -->
      <section>
        <span>Horizontal</span>
        <hr class="divider is-horizontal" />

        <hr class="divider is-horizontal has-space-none" />
        <hr class="divider is-horizontal has-space-xx-small" />
        <hr class="divider is-horizontal has-space-x-small" />
        <hr class="divider is-horizontal has-space-small" />
        <hr class="divider is-horizontal has-space-normal" />
        <hr class="divider is-horizontal has-space-medium" />
        <hr class="divider is-horizontal has-space-large" />
        <hr class="divider is-horizontal has-space-x-large" />
        <hr class="divider is-horizontal has-space-xx-large" />
        <hr class="divider is-horizontal has-space-xxx-large" />
      </section>

      <!-- Vertical -->
      <section style="display: flex; height: 8rem">
        <span>Vertical</span>
        <hr class="divider is-vertical" />

        <hr class="divider is-vertical has-space-none" />
        <hr class="divider is-vertical has-space-xx-small" />
        <hr class="divider is-vertical has-space-x-small" />
        <hr class="divider is-vertical has-space-small" />
        <hr class="divider is-vertical has-space-normal" />
        <hr class="divider is-vertical has-space-medium" />
        <hr class="divider is-vertical has-space-large" />
        <hr class="divider is-vertical has-space-x-large" />
        <hr class="divider is-vertical has-space-xx-large" />
        <hr class="divider is-vertical has-space-xxx-large" />
      </section>
    </main>
  </body>
</html>
