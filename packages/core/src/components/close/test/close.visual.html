<!doctype html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <link rel="stylesheet" href="/assets/section.css" />
    <link rel="stylesheet" href="/assets/styles/design-system.local.min.css" />

    <script type="module" src="/build/design-system.esm.js"></script>
    <script nomodule src="/build/design-system.js"></script>
  </head>
  <body>
    <main class="container">
      <!-- Basic Style -->
      <section data-testid="basic">
        <span>Basic</span>
        <ds-close></ds-close>
      </section>

      <!-- Button -->
      <section data-testid="button">
        <span>Button</span>
        <div class="stack as-row">
          <ds-close button size="sm"></ds-close>
          <ds-close button></ds-close>
          <ds-close button size="medium"></ds-close>
        </div>
        <div class="stack as-row">
          <ds-close button button-color="secondary"></ds-close>
        </div>
      </section>

      <!-- Themeing -->
      <section class="my-theme" data-testid="themeing">
        <span>Themeing</span>
        <style>
          .my-theme bal-close {
            --close-color-background: #ff0000;
            --close-color-icon: #00ff00;
          }
        </style>
        <ds-close></ds-close>
      </section>

      <!-- Disabled -->
      <section data-testid="disabled">
        <span>Disabled</span>
        <div class="stack as-row">
          <ds-close size="medium" disabled></ds-close>
          <ds-close button disabled></ds-close>
        </div>
      </section>

      <!-- Sizes -->
      <section data-testid="sizes">
        <span>Sizes</span>
        <ds-close size="small"></ds-close>
        <ds-close></ds-close>
        <ds-close size="medium"></ds-close>
      </section>

      <!-- Inverted -->
      <section class="s-bg-inverted" data-testid="inverted">
        <span>Inverted</span>
        <ds-close inverted size="small"></ds-close>
        <ds-close inverted></ds-close>
        <ds-close inverted size="medium"></ds-close>
        <ds-close inverted button></ds-close>
      </section>
    </main>
  </body>
</html>
