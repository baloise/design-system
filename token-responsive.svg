<svg viewBox="0 0 760 310" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Responsive token breakpoints with device variable: Heading 1 (3xl)">
  <defs>
    <marker id="arrd" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Section label -->
  <text x="380" y="18" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#64748b">Fixed breakpoint tokens — Heading 1 (3xl)</text>

  <!-- ── Mobile ── -->
  <rect x="20" y="28" width="215" height="130" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="127" y="22" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#334155">📱 Mobile  (default)</text>
  <rect x="30" y="38" width="195" height="24" rx="5" fill="#e2e8f0"/>
  <text x="127" y="55" text-anchor="middle" font-family="monospace" font-size="10" fill="#1e293b">--ds-text-size-3xl-mobile</text>
  <text x="127" y="75" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748b">→ var(--ds-font-size-28)  =  1.75rem</text>
  <!-- H1 preview at 28px equiv -->
  <text x="127" y="132" text-anchor="middle" font-family="sans-serif" font-size="34" font-weight="700" fill="#0f172a">Heading 1</text>
  <text x="127" y="152" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#94a3b8">28px / 1.75rem</text>

  <!-- ── Tablet ── -->
  <rect x="272" y="28" width="215" height="130" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="379" y="22" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#334155">💻 Tablet  (≥ 769px)</text>
  <rect x="282" y="38" width="195" height="24" rx="5" fill="#e2e8f0"/>
  <text x="379" y="55" text-anchor="middle" font-family="monospace" font-size="10" fill="#1e293b">--ds-text-size-3xl-tablet</text>
  <text x="379" y="75" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748b">→ var(--ds-font-size-40)  =  2.5rem</text>
  <!-- H1 preview at 40px equiv -->
  <text x="379" y="128" text-anchor="middle" font-family="sans-serif" font-size="48" font-weight="700" fill="#0f172a">Heading 1</text>
  <text x="379" y="152" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#94a3b8">40px / 2.5rem</text>

  <!-- ── Desktop ── -->
  <rect x="524" y="28" width="215" height="130" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="631" y="22" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#334155">🖥️ Desktop  (≥ 1024px)</text>
  <rect x="534" y="38" width="195" height="24" rx="5" fill="#e2e8f0"/>
  <text x="631" y="55" text-anchor="middle" font-family="monospace" font-size="10" fill="#1e293b">--ds-text-size-3xl-desktop</text>
  <text x="631" y="75" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748b">→ var(--ds-font-size-40)  =  2.5rem</text>
  <!-- H1 preview at 40px equiv -->
  <text x="631" y="128" text-anchor="middle" font-family="sans-serif" font-size="48" font-weight="700" fill="#0f172a">Heading 1</text>
  <text x="631" y="152" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#94a3b8">40px / 2.5rem</text>

  <!-- ── Arrows down ── -->
  <line x1="127" y1="165" x2="127" y2="196" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrd)"/>
  <line x1="379" y1="165" x2="379" y2="196" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrd)"/>
  <line x1="631" y1="165" x2="631" y2="196" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrd)"/>

  <!-- ── Device token ── -->
  <rect x="20" y="200" width="719" height="94" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="380" y="194" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#1d4ed8">-device token — auto-responsive (use this in code)</text>

  <rect x="32" y="212" width="260" height="24" rx="5" fill="#dbeafe"/>
  <text x="162" y="229" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#1e40af">--ds-text-size-3xl-device</text>

  <text x="312" y="229" font-family="sans-serif" font-size="10" fill="#3b82f6">= 1.75rem  (mobile default)</text>
  <text x="312" y="248" font-family="sans-serif" font-size="10" fill="#3b82f6">= 2.5rem   at @media (min-width: 769px)</text>
  <text x="312" y="267" font-family="sans-serif" font-size="10" fill="#3b82f6">= 2.5rem   at @media (min-width: 1024px)</text>

  <text x="700" y="248" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="700" fill="#1d4ed8">↔</text>
  <text x="700" y="268" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#64748b">adapts</text>
</svg>
