<svg viewBox="0 0 760 230" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Four-layer CSS variable cascade inside a component">
  <defs>
    <marker id="arr3" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Column headers -->
  <text x="90" y="18" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#64748b">Private</text>
  <text x="255" y="18" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#64748b">Public (consumer)</text>
  <text x="450" y="18" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#64748b">Modifier (variant)</text>
  <text x="650" y="18" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#64748b">Token (default)</text>

  <!-- Private box -->
  <rect x="20" y="30" width="140" height="160" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="90" y="50" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#9f1239">Used in CSS rules only</text>
  <text x="90" y="65" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#9f1239">Never written from outside</text>
  <text x="90" y="105" text-anchor="middle" font-family="monospace" font-size="9" fill="#7f1d1d">--_button-</text>
  <text x="90" y="119" text-anchor="middle" font-family="monospace" font-size="9" fill="#7f1d1d">color-text</text>
  <rect x="30" y="140" width="120" height="38" rx="6" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="90" y="157" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#7f1d1d">background: var(</text>
  <text x="90" y="170" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#7f1d1d">--_button-color-text)</text>

  <!-- Arrow 1 -->
  <line x1="160" y1="110" x2="178" y2="110" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr3)"/>
  <text x="169" y="107" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#94a3b8">var(</text>

  <!-- Public box -->
  <rect x="180" y="30" width="150" height="160" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <text x="255" y="50" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#9a3412">Set by consumers/themes</text>
  <text x="255" y="65" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#9a3412">on a specific instance</text>
  <text x="255" y="105" text-anchor="middle" font-family="monospace" font-size="9" fill="#7c2d12">--button-</text>
  <text x="255" y="119" text-anchor="middle" font-family="monospace" font-size="9" fill="#7c2d12">color-text</text>
  <rect x="190" y="140" width="130" height="38" rx="6" fill="#ffedd5" stroke="#fdba74" stroke-width="1"/>
  <text x="255" y="157" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#7c2d12">ds-button {</text>
  <text x="255" y="170" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#7c2d12">--button-color-text: red</text>

  <!-- Arrow 2 -->
  <line x1="330" y1="110" x2="348" y2="110" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr3)"/>
  <text x="339" y="107" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#94a3b8">var(</text>

  <!-- Modifier box -->
  <rect x="350" y="30" width="160" height="160" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="430" y="50" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#166534">Set by variant classes</text>
  <text x="430" y="65" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#166534">.is-primary, .is-sm …</text>
  <text x="430" y="105" text-anchor="middle" font-family="monospace" font-size="9" fill="#14532d">--mod-button-</text>
  <text x="430" y="119" text-anchor="middle" font-family="monospace" font-size="9" fill="#14532d">color-text</text>
  <rect x="360" y="140" width="140" height="38" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="430" y="157" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#14532d">:host(.is-primary) {</text>
  <text x="430" y="170" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#14532d">--mod-button-…: white</text>

  <!-- Arrow 3 -->
  <line x1="510" y1="110" x2="528" y2="110" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr3)"/>
  <text x="519" y="107" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#94a3b8">var(</text>

  <!-- Token box -->
  <rect x="530" y="30" width="210" height="160" rx="8" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1.5"/>
  <text x="635" y="50" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6b21a8">Global design token</text>
  <text x="635" y="65" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6b21a8">from packages/tokens</text>
  <text x="635" y="105" text-anchor="middle" font-family="monospace" font-size="9" fill="#3b0764">--ds-button-color-</text>
  <text x="635" y="119" text-anchor="middle" font-family="monospace" font-size="9" fill="#3b0764">primary-base-text</text>
  <rect x="540" y="140" width="190" height="38" rx="6" fill="#f3e8ff" stroke="#d8b4fe" stroke-width="1"/>
  <text x="635" y="157" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#3b0764">:root {</text>
  <text x="635" y="170" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#3b0764">--ds-button-…: #fff }</text>

  <!-- Closing paren label -->
  <text x="690" y="110" font-family="sans-serif" font-size="11" fill="#94a3b8">)))</text>
</svg>
