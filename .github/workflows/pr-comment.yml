name: 🤖 PR Commands

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, closed]

jobs:
  createIssueBranch:
    name: 📝 Create Issue Branch
    runs-on: ubuntu-24.04
    steps:
      - uses: robvanderleek/create-issue-branch@1.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  snapshot:
    name: 🚚 Create Snapshot
    if: github.event.issue.pull_request && contains(github.event.comment.body, '/snapshot')
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Get Action URL
        id: action-url
        run: echo "url=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_OUTPUT

      - name: Create comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ github.event.comment.id }}
          edit-mode: replace
          body: |
            **🚚 Snapshot Version in Progress...**

            [Check out the release on GitHub ↗︎](${{ steps.action-url.outputs.url }})

      - name: Get Branch Name
        id: get-branch
        # Use the event payload directly instead of calling the API with jq
        run: |
          echo "branch=${{ github.event.issue.pull_request.head.ref }}" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.get-branch.outputs.branch }}
          fetch-depth: 0
      - uses: ./.github/workflows/actions/setup

      - name: get-npm-version
        id: package-version
        uses: martinbeentjes/npm-get-version-action@v1.3.1
        with:
          path: packages/core

      - name: Get Last Commit SHA
        id: last-commit
        run: |
          COMMITS_URL="https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.issue.number }}/commits"
          LAST_COMMIT_SHA=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" $COMMITS_URL | jq -r '.[-1].sha')
          echo "sha=$LAST_COMMIT_SHA" >> $GITHUB_OUTPUT

      - name: Shorten Commit Sha
        id: short-sha
        run: echo "value=$(git rev-parse --short ${{ steps.last-commit.outputs.sha }})" >> $GITHUB_OUTPUT

      - name: Create version
        id: set-version
        run: echo "version=${{ steps.package-version.outputs.current-version}}-snapshot.${{ github.event.issue.number }}-${{ steps.short-sha.outputs.value }}" >> $GITHUB_OUTPUT

      - name: Print version
        run: echo "${{steps.set-version.outputs.version}}"

      - uses: ./.github/workflows/actions/release-setup
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          npm-token: ${{ secrets.NPM_PUBLISH_TOKEN }}

      - name: Define version
        run: |
          npm version ${{steps.set-version.outputs.version}} --workspaces --allow-same-version --no-git-tag-version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: npx turbo run build
        env:
          DS_RELEASE: true

      - name: Pre-Publish
        run: node scripts/pre-publish.mjs

      - name: Publish
        run: npm publish --workspaces --tag=snapshot

      - name: Create comment
        if: success()
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ github.event.comment.id }}
          edit-mode: replace
          body: |
            **🚀 Snapshot Version Released!**

            Version: `${{ steps.set-version.outputs.version }}`

            [Check out the release on GitHub ↗︎](${{ steps.action-url.outputs.url }})

      - name: Create comment
        if: failure()
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ github.event.comment.id }}
          edit-mode: replace
          body: |
            **🚨 Snapshot Version Failed!**

            Version: `${{ steps.set-version.outputs.version }}`

            [Check out the release on GitHub ↗︎](${{ steps.action-url.outputs.url }})

      - name: Git Reset
        run: git reset --hard

  assembleInformation:
    name: 📝 Assemble Information
    if: github.event.issue.pull_request && contains(github.event.comment.body, '/update-screenshots')
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      HUSKY: 0
      CI: true
    outputs:
      action: ${{ steps.action.outputs.url }}
      branch: ${{ steps.branch.outputs.branch }}
      command: ${{ steps.command.outputs.result }}
      specs: ${{ steps.specs.outputs.result }}
    steps:
      - name: Get Action URL
        id: action
        run: |
          echo "url=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_OUTPUT

      - name: Check for /update-screenshots command
        uses: actions/github-script@v7
        id: command
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          result-encoding: string
          script: |
            const comment = context.payload.comment.body.trim();
            const regex = /\/update-screenshots(?:\s+(.*))?/;
            if (regex.test(comment)) {
              const match = comment.match(regex);
              const imageName = match[1] ? match[1].trim() : '';
              if(imageName !== ''){
                return imageName
              }
              return 'all'
            }
            return 'none'

      - name: Filter specs
        uses: actions/github-script@v7
        id: specs
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          result-encoding: string
          script: |
            const comment = context.payload.comment.body.trim();
            const regex = /\/update-screenshots(?:\s+(.*))?/;
            if (regex.test(comment)) {
              const match = comment.match(regex);
              const imageName = match[1] ? match[1].trim() : '';
              if(imageName !== ''){
                return imageName.split(',').map(v => `${v}`);
              }
              return 'all'
            }
            return 'none'

      - name: Get results
        run: |
          echo "${{ steps.command.outputs.result }}"
          echo "${{ steps.specs.outputs.result }}"

      - name: Get Branch Name
        id: branch
        run: |
          COMMITS_URL="${{ github.event.issue.pull_request.url }}"
          BRANCH=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" $COMMITS_URL | jq -r '.head.ref')
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

  updateScreenshots:
    name: 📸 Update Screenshots
    if: github.event.issue.pull_request && contains(github.event.comment.body, '/update-screenshots')
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: [assembleInformation]
    env:
      HUSKY: 0
      CI: true
      DS_PLAYWRIGHT_TESTING: 'true'
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
      options: --user 1001
    steps:
      - name: Show inputs from pree job
        run: |
          echo "Branch from pree job: ${{ needs.assembleInformation.outputs.branch }}"
          echo "Command: ${{ needs.assembleInformation.outputs.command }}"
          echo "Specs: ${{ needs.assembleInformation.outputs.specs }}"
          echo "Action: ${{ needs.assembleInformation.outputs.action }}"

      - name: Create comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ github.event.comment.id }}
          edit-mode: replace
          body: |
            **📸 Update Screenshots in Progress...**

            Specs: `${{ needs.assembleInformation.outputs.command }}`

            [Check out the action on GitHub ↗︎](${{ needs.assembleInformation.outputs.action }})

      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.assembleInformation.outputs.branch }}
          token: ${{ secrets.PRE_RELEASE_GITHUB_TOKEN }}
          fetch-depth: 2

      - uses: ./.github/workflows/actions/setup-environment
        with:
          token: ${{ secrets.PRE_RELEASE_GITHUB_TOKEN }}
          branch: ${{ needs.assembleInformation.outputs.branch }}
          action: ${{ needs.assembleInformation.outputs.action }}

      - name: Install dependencies
        run: npm ci

      - name: Build Core
        run: npx turbo run build --filter=@baloise/ds-core

      - name: Write visual config template
        run: |
          cat > packages/core/playwright.visual.config.mts <<TS
          /**
          * This configuration is used to run visual tests for a specific
          * component across multiple devices and browsers.
          */
          import { defineConfig, devices } from '@playwright/test'
          import baseConfig from './playwright.config'

          const TAG = '${{ needs.assembleInformation.outputs.command }}'
          const testMatch = ['src/components/' + TAG + '/test/*visual.play.ts']

          console.log('testMatch', testMatch)

          export default defineConfig({
            ...baseConfig,
            projects: [
              {
                name: '🖼️ Visual / 💻 Desktop Chrome',
                testMatch,
                use: { ...devices['Desktop Chrome'] },
              },
              {
                name: '🖼️ Visual / 📱 Mobile Chrome',
                testMatch,
                use: { ...devices['Pixel 5'] },
              },
            ],
          })
          TS

      - name: Replace DS-TAG with provided tag
        run: |
          echo "---- file preview ----"
          sed -n '1,160p' packages/core/playwright.visual.config.mts
          echo "---- end preview ----"

      - name: Run Playwright tests
        working-directory: packages/core
        run: npx playwright test --config=playwright.visual.config.mts --update-snapshots

      - name: Commit snapshots
        uses: EndBug/add-and-commit@v9
        with:
          message: 'update snapshots'
        env:
          GITHUB_TOKEN: ${{ secrets.PRE_RELEASE_GITHUB_TOKEN }}

      - name: Create comment
        if: success()
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ github.event.comment.id }}
          edit-mode: replace
          body: |
            **📸 Update Screenshots finished!**

            Specs: `${{ needs.assembleInformation.outputs.command }}`

            [Check out the action on GitHub ↗︎](${{ needs.assembleInformation.outputs.action }})

      - name: Create comment
        if: failure()
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ github.event.comment.id }}
          edit-mode: replace
          body: |
            **🚨 Update Screenshots Failed!**

            Specs: `${{ needs.assembleInformation.outputs.command }}`

            [Check out the action on GitHub ↗︎](${{ needs.assembleInformation.outputs.action }})
