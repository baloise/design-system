name: 🚀 Release

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run mode (no actual publish or commit)'
        required: false
        type: boolean
        default: false

concurrency: ${{ github.workflow }}-${{ github.ref }}

env:
  DS_RELEASE: true

jobs:
  Release:
    name: 🚀 Release
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'changeset-release/next')
    runs-on: ubuntu-24.04
    permissions:
      id-token: write # Required for OIDC
      contents: write # Also covers SBOM submission to GitHub dependency graph
    timeout-minutes: 15
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - uses: ./.github/workflows/actions/setup-environment
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          npm-token: ${{ secrets.NPM_PUBLISH_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Build
        run: npx turbo run build

      - name: Pre-Publish
        run: node scripts/pre-publish.mjs

      - name: Read current version
        id: package-version
        uses: martinbeentjes/npm-get-version-action@v1.3.1
        with:
          path: packages/core

      - name: Show Release Changes (Dry Run)
        if: ${{ inputs.dry-run }}
        run: |
          echo "📋 Changes that would be committed:"
          echo ""
          echo "=== CHANGELOG.md ==="
          head -50 CHANGELOG.md
          echo ""
          echo "=== packages/core/package.json ==="
          cat packages/core/package.json | head -50
          echo ""
          echo "📦 Version: ${{ steps.package-version.outputs.current-version }}"
          echo "🏷️  Tag: v${{ steps.package-version.outputs.current-version }}"
          echo ""
          echo "📤 NPM Publish (Dry Run):"
          npm publish --workspaces --tag next --dry-run

      - name: Commit release
        if: ${{ !inputs.dry-run }}
        uses: EndBug/add-and-commit@v10
        with:
          add: "['package-lock.json', 'CHANGELOG.md']"
          message: ':bookmark: release: ${{ steps.package-version.outputs.current-version }}'
          tag: 'v${{ steps.package-version.outputs.current-version }}'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Generates a Software Bill of Materials (SBOM) in CycloneDX JSON format.
      # Lists every direct and transitive npm dependency with name, version, and license.
      # Required per EU Cyber Resilience Act (CRA) — open source stewards must provide
      # machine-readable software composition data with each release.
      - name: Generate SBOM
        if: ${{ !inputs.dry-run }}
        run: npx cyclonedx-npm --output-format JSON --output-file sbom.cdx.json

      # Copies the SBOM into each published package directory and adds it to the package's
      # "files" allowlist so npm includes it in the tarball. This is done at release time
      # (not in static package.json) because Stencil validates that listed files exist on
      # disk at build time — the SBOM only exists after it is generated above.
      - name: Bundle SBOM into all published packages
        if: ${{ !inputs.dry-run }}
        run: |
          for pkg in packages/core packages/assets packages/css packages/playwright packages/tokens; do
            cp sbom.cdx.json $pkg/sbom.cdx.json
            node -e "
              const fs = require('fs');
              const p = JSON.parse(fs.readFileSync('$pkg/package.json', 'utf8'));
              if (!p.files.includes('sbom.cdx.json')) p.files.push('sbom.cdx.json');
              fs.writeFileSync('$pkg/package.json', JSON.stringify(p, null, 2) + '\n');
            "
          done

      # Submits the SBOM to GitHub's Dependency Submission API so GitHub knows the full
      # transitive dependency tree of every published package — not just direct deps.
      # This is critical for downstream consumers (e.g. Java projects) that use this design
      # system: if a CVE is published for a transitive JS dependency inside ds-core, GitHub
      # can trace the vulnerability through to those consuming projects and raise a Dependabot
      # alert there. Without this step, the Java project has no visibility into what is
      # bundled inside the npm packages it depends on.
      - name: Submit SBOM to GitHub dependency graph
        if: ${{ !inputs.dry-run }}
        uses: advanced-security/sbom-report-action@v1
        with:
          sbom-path: sbom.cdx.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish
        if: ${{ !inputs.dry-run }}
        run: npm publish --workspaces --tag next
