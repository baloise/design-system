name: 👷 Continuous

on:
  push:
    branches:
      - next
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: 🏗️ Lint, Test & Build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      HUSKY: 0
    steps:
      - name: Check out code
        uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - uses: ./.github/workflows/actions/setup-environment

      - name: Install dependencies
        run: npm ci

      - name: Check format
        run: npm run format:check

      - name: Check spelling
        run: npm run spell

      - name: Lint
        run: npm run lint

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

      - name: Generate SBOM
        if: github.event_name == 'push'
        run: npx cyclonedx-npm --output-format JSON --output-file sbom.cdx.json

      - name: Upload SBOM artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.cdx.json
          retention-days: 30

      - uses: ./.github/workflows/actions/upload-distribution-archives

  assembleInformation:
    name: 📝 Assemble Information
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      HUSKY: 0
      CI: true
    outputs:
      action: ${{ steps.action.outputs.url }}
      branch: ${{ steps.branch.outputs.branch }}
    steps:
      - name: Get Action URL
        id: action
        run: |
          echo "url=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_OUTPUT

      - name: Get Branch Name
        id: branch
        # Determine branch reliably from the event payload.
        # - For pull_request events use github.head_ref (the source branch name)
        # - For push events parse GITHUB_REF (refs/heads/<branch>)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "branch=${{ github.head_ref }}" >> $GITHUB_OUTPUT
          else
            # strip refs/heads/ prefix
            BRANCH_NAME=${GITHUB_REF#refs/heads/}
            echo "branch=$BRANCH_NAME" >> $GITHUB_OUTPUT
          fi

  playwright:
    name: 🎭 Playwright
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: [assembleInformation]
    env:
      HUSKY: 0
      CI: 1
      DS_PLAYWRIGHT_TESTING: 'true'
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
      options: --user 1001
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4, 5, 6] # six parallel jobs
        shardTotal: [6] # total 6 shards
    steps:
      - name: Check out code
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.assembleInformation.outputs.branch }}
          fetch-depth: 2

      - uses: ./.github/workflows/actions/setup-environment
        with:
          branch: ${{ needs.assembleInformation.outputs.branch }}
          action: ${{ needs.assembleInformation.outputs.action }}

      - name: Install dependencies
        run: npm ci

      - name: Build Core
        run: npx turbo run build --filter=@baloise/ds-core

      - name: Run Playwright tests
        working-directory: packages/core
        run: npx playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}

      # - name: Commit snapshots
      #   if: always()
      #   uses: EndBug/add-and-commit@v9
      #   with:
      #     message: 'update snapshots'
      #     add: '*.png'
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.PRE_RELEASE_GITHUB_TOKEN }}

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-shard-${{ matrix.shardIndex }}
          path: packages/core/playwright-report
          retention-days: 7
