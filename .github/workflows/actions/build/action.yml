name: 'Build'
description: 'Build'
inputs:
  build:
    description: 'Build packages'
    default: true
    required: false
  token:
    description: 'GitHub token'
    required: false
runs:
  using: 'composite'
  steps:
    - uses: ./.github/workflows/actions/setup
      with:
        token: ${{ inputs.token }}

    - name: Clean install
      shell: bash
      run: npm ci

    - name: Setup Turborepo cache
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: 'npm'

    - name: Check format
      shell: bash
      run: npm run format:check

    - name: Check spelling
      shell: bash
      run: npm run spell

    - name: Lint & Build
      shell: bash
      run: npx turbo run lint build

    - name: Test
      shell: bash
      run: npx turbo run test

    # - name: Build
