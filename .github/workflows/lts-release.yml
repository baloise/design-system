name: 🛡️🚀 LTS Release (Main)

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run mode (no actual publish or commit)'
        required: false
        type: boolean
        default: false

concurrency: ${{ github.workflow }}-${{ github.ref }}

env:
  DS_RELEASE: true

jobs:
  LtsRelease:
    name: 🛡️🚀 LTS Release (Main)
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'changeset-release/main')
    runs-on: ubuntu-24.04
    permissions:
      id-token: write # Required for OIDC
      contents: write
    timeout-minutes: 15
    steps:
      - name: Check out code
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - uses: ./.github/workflows/actions/setup-environment
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          npm-token: ${{ secrets.NPM_PUBLISH_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx nx run-many -t build --projects=tag:scope:release

      - name: Update changelog file
        run: awk 'NR==1 {print "# Changelog"} NR!=1' packages/core/CHANGELOG.md > CHANGELOG.md

      - name: Pre-Publish
        run: npx nx run pre-publish

      - name: Read current version
        id: package-version
        uses: martinbeentjes/npm-get-version-action@v1.3.1
        with:
          path: packages/core

      - name: Show Release Changes (Dry Run)
        if: ${{ inputs.dry-run }}
        run: |
          echo "📋 Changes that would be committed:"
          echo ""
          echo "=== CHANGELOG.md ==="
          head -50 CHANGELOG.md
          echo ""
          echo "=== packages/core/package.json ==="
          cat packages/core/package.json | head -50
          echo ""
          echo "📦 Version: ${{ steps.package-version.outputs.current-version }}"
          echo "🏷️  Tag: v${{ steps.package-version.outputs.current-version }}"
          echo ""
          echo "📤 NPM Publish (Dry Run):"
          npm publish --workspaces --dry-run

      - name: Commit release
        if: ${{ !inputs.dry-run }}
        uses: EndBug/add-and-commit@v9
        with:
          add: "['package-lock.json', 'CHANGELOG.md']"
          message: ':bookmark: release: ${{ steps.package-version.outputs.current-version }}'
          tag: 'v${{ steps.package-version.outputs.current-version }}'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish
        if: ${{ !inputs.dry-run }}
        run: npx nx release publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
