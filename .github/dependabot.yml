version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Zurich
    ignore:
      ## Since the project engine is Node.Js version 24.
      - dependency-name: '@types/node'
        versions: ['>=25.0.0']
      ## Due to Angular we need to stay on TypeScript 5.7 for now.
      - dependency-name: 'typescript'
        versions: ['>=5.7.0']
      ## Since we do visual regression testing with Playwright, we need to stay on version 1.59.1 for now.
      - dependency-name: '@playwright/test'
        versions: ['>=1.60.0']
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Zurich
