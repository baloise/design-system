<?xml version="1.0" encoding="UTF-8"?>
<!--
  Design token primitives:
  Purple  1:#F9F3FF  2:#E1D9FF  3:#B8B2FF  5:#9F52CC  6:#6C2273
  Yellow  1:#FFF9E8  2:#FFECBC  3:#FAE052  4:#FFBE19  5:#FA9319  6:#B24A00
  Red     1:#FFEEF1  2:#FFD7D7  3:#FFACA6  4:#FF596F  5:#D9304C  6:#99172D
  Green   1:#E9FBF7  2:#CBF2EC  3:#94E3D4  4:#21D9AC  5:#00B28F  6:#1B5951
-->
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="200" viewBox="0 0 880 200">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="880" height="200" fill="#ffffff"/>

  <!-- ╔══════════════════════════════════════╗ -->
  <!-- ║  Host: ds-button-group  (Purple)     ║ -->
  <!-- ╚══════════════════════════════════════╝ -->
  <rect x="20" y="40" width="840" height="140" rx="8" fill="#F9F3FF" stroke="#B8B2FF" stroke-width="2" filter="url(#shadow)"/>
  <!-- badge -->
  <rect x="36" y="27" width="170" height="26" rx="13" fill="#9F52CC"/>
  <text x="121" y="45" text-anchor="middle" fill="white" font-size="12" font-family="'Courier New', Courier, monospace" font-weight="600">ds-button-group</text>

  <!-- ┌─────────────────────────────────────┐ -->
  <!-- │  part="group"  (Yellow)             │ -->
  <!-- └─────────────────────────────────────┘ -->
  <rect x="55" y="95" width="770" height="70" rx="6" fill="#FFF9E8" stroke="#FFBE19" stroke-width="1.5"/>
  <!-- badge -->
  <rect x="71" y="82" width="122" height="26" rx="13" fill="#FA9319"/>
  <text x="132" y="100" text-anchor="middle" fill="white" font-size="12" font-family="'Courier New', Courier, monospace" font-weight="500">part="group"</text>
</svg>
