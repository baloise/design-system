<?xml version="1.0" encoding="UTF-8"?>
<!--
  Design token primitives:
  Purple  1:#F9F3FF  2:#E1D9FF  3:#B8B2FF  5:#9F52CC  6:#6C2273
  Yellow  1:#FFF9E8  2:#FFECBC  3:#FAE052  4:#FFBE19  5:#FA9319  6:#B24A00
  Red     1:#FFEEF1  2:#FFD7D7  3:#FFACA6  4:#FF596F  5:#D9304C  6:#99172D
  Green   1:#E9FBF7  2:#CBF2EC  3:#94E3D4  4:#21D9AC  5:#00B28F  6:#1B5951
-->
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="880" height="480" fill="#ffffff"/>

  <!-- ╔══════════════════════════════════════╗ -->
  <!-- ║  Host: ds-snackbar  (Purple)         ║ -->
  <!-- ╚══════════════════════════════════════╝ -->
  <rect x="20" y="40" width="840" height="420" rx="8" fill="#F9F3FF" stroke="#B8B2FF" stroke-width="2" filter="url(#shadow)"/>
  <!-- badge -->
  <rect x="36" y="27" width="130" height="26" rx="13" fill="#9F52CC"/>
  <text x="101" y="45" text-anchor="middle" fill="white" font-size="12" font-family="'Courier New', Courier, monospace" font-weight="600">ds-snackbar</text>

  <!-- ┌────┐  (left column — spans full height) -->
  <!-- │icon│ -->
  <!-- └────┘ -->
  <rect x="55" y="95" width="80" height="345" rx="6" fill="#FFEEF1" stroke="#FF596F" stroke-width="1.5"/>
  <!-- badge -->
  <rect x="71" y="82" width="108" height="26" rx="13" fill="#D9304C"/>
  <text x="125" y="100" text-anchor="middle" fill="white" font-size="12" font-family="'Courier New', Courier, monospace" font-weight="500">part="icon"</text>

  <!-- ┌───────────────────────────────────────┐ -->
  <!-- │  part="content"  (Yellow — top right) │ -->
  <!-- └───────────────────────────────────────┘ -->
  <rect x="152" y="95" width="688" height="180" rx="6" fill="#FFF9E8" stroke="#FFBE19" stroke-width="1.5"/>
  <!-- badge -->
  <rect x="168" y="82" width="130" height="26" rx="13" fill="#FA9319"/>
  <text x="233" y="100" text-anchor="middle" fill="white" font-size="12" font-family="'Courier New', Courier, monospace" font-weight="500">part="content"</text>

  <!-- heading (Green) -->
  <rect x="172" y="135" width="648" height="50" rx="5" fill="#E9FBF7" stroke="#21D9AC" stroke-width="1.5"/>
  <!-- badge -->
  <rect x="188" y="122" width="130" height="26" rx="13" fill="#00B28F"/>
  <text x="253" y="140" text-anchor="middle" fill="white" font-size="12" font-family="'Courier New', Courier, monospace" font-weight="500">part="heading"</text>

  <!-- message (Green) -->
  <rect x="172" y="205" width="648" height="55" rx="5" fill="#E9FBF7" stroke="#21D9AC" stroke-width="1.5"/>
  <!-- badge -->
  <rect x="188" y="192" width="130" height="26" rx="13" fill="#00B28F"/>
  <text x="253" y="210" text-anchor="middle" fill="white" font-size="12" font-family="'Courier New', Courier, monospace" font-weight="500">part="message"</text>

  <!-- ┌──────────────────────────────────────────┐ -->
  <!-- │  part="action"  (Yellow — below content) │ -->
  <!-- │  ┌──────────────┐   ┌──────────────┐    │ -->
  <!-- │  │ part="button"│   │ part="close" │    │ -->
  <!-- │  └──────────────┘   └──────────────┘    │ -->
  <!-- └──────────────────────────────────────────┘ -->
  <rect x="152" y="292" width="688" height="148" rx="6" fill="#FFF9E8" stroke="#FFBE19" stroke-width="1.5"/>
  <!-- badge -->
  <rect x="168" y="279" width="122" height="26" rx="13" fill="#FA9319"/>
  <text x="229" y="297" text-anchor="middle" fill="white" font-size="12" font-family="'Courier New', Courier, monospace" font-weight="500">part="action"</text>

  <!-- button (Red — inside action, left) -->
  <rect x="172" y="332" width="310" height="90" rx="5" fill="#FFEEF1" stroke="#FF596F" stroke-width="1.5"/>
  <!-- badge -->
  <rect x="188" y="319" width="122" height="26" rx="13" fill="#D9304C"/>
  <text x="249" y="337" text-anchor="middle" fill="white" font-size="12" font-family="'Courier New', Courier, monospace" font-weight="500">part="button"</text>

  <!-- close (Red — inside action, right) -->
  <rect x="502" y="332" width="310" height="90" rx="5" fill="#FFEEF1" stroke="#FF596F" stroke-width="1.5"/>
  <!-- badge -->
  <rect x="518" y="319" width="114" height="26" rx="13" fill="#D9304C"/>
  <text x="575" y="337" text-anchor="middle" fill="white" font-size="12" font-family="'Courier New', Courier, monospace" font-weight="500">part="close"</text>
</svg>
