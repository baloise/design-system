<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" width="880" height="300">
  <!-- Background -->
  <rect width="880" height="300" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Host container (yellow) -->
  <rect x="40" y="40" width="800" height="220" fill="#fffde7" stroke="#fbc02d" stroke-width="2" rx="4"/>
  <text x="60" y="65" font-size="12" font-weight="bold" fill="#fbc02d">host (separator)</text>

  <!-- Divider line container (yellow - main) -->
  <rect x="80" y="100" width="720" height="80" fill="#fff9c4" stroke="#fbc02d" stroke-width="1" rx="4"/>
  <text x="100" y="120" font-size="12" font-weight="bold" fill="#f57f17">divider container</text>

  <!-- Solid divider line (red - interactive) -->
  <line x1="120" y1="150" x2="780" y2="150" stroke="#f44336" stroke-width="2"/>
  <text x="200" y="145" font-size="10" fill="#c62828">solid line</text>

  <!-- Alternative: dashed divider (shown below) -->
  <line x1="120" y1="175" x2="780" y2="175" stroke="#f44336" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="200" y="170" font-size="10" fill="#c62828">dashed variant</text>

  <!-- Part badges -->
  <g id="divider-badge">
    <circle cx="680" cy="265" r="35" fill="#fbc02d" stroke="#f44336" stroke-width="1"/>
    <text x="680" y="270" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">part="divider"</text>
  </g>
</svg>
