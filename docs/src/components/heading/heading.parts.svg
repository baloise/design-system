<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" width="880" height="300">
  <!-- Background -->
  <rect width="880" height="300" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Host container (purple) -->
  <rect x="40" y="40" width="800" height="220" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="4"/>
  <text x="60" y="65" font-size="12" font-weight="bold" fill="#9c27b0">host</text>

  <!-- Heading element (yellow - main container) -->
  <rect x="80" y="90" width="720" height="140" fill="#fffde7" stroke="#fbc02d" stroke-width="2" rx="4"/>
  <text x="100" y="115" font-size="12" font-weight="bold" fill="#f57f17">heading (h1–h6)</text>

  <!-- Content text (green - content area) -->
  <rect x="120" y="135" width="640" height="60" fill="#e8f5e9" stroke="#4caf50" stroke-width="2" rx="4"/>
  <text x="140" y="160" font-size="12" font-weight="bold" fill="#2e7d32">text content (slot)</text>
  <text x="140" y="180" font-size="11" fill="#558b2f" font-style="italic">The quick brown fox...</text>

  <!-- Part badges -->
  <g id="heading-badge">
    <circle cx="680" cy="265" r="35" fill="#fbc02d" stroke="#9c27b0" stroke-width="1"/>
    <text x="680" y="270" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">part="heading"</text>
  </g>
</svg>
