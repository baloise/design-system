<svg viewBox="0 0 960 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Token name anatomy with breakdown" preserveAspectRatio="xMidYMid meet" width="100%">
  <!-- Full token example -->
  <text x="480" y="25" text-anchor="middle" font-family="monospace" font-size="14" fill="#1e293b" font-weight="700">
    --ds-button-primary-color-bg-base
  </text>

  <!-- Vertical breakdown lines -->
  <line x1="58" y1="35" x2="58" y2="140" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="118" y1="35" x2="118" y2="140" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="195" y1="35" x2="195" y2="140" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="275" y1="35" x2="275" y2="140" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="345" y1="35" x2="345" y2="140" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="395" y1="35" x2="395" y2="140" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="450" y1="35" x2="450" y2="140" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Segment labels with descriptions -->

  <!-- 1. NAMESPACE: ds -->
  <rect x="15" y="155" width="85" height="50" rx="6" fill="#dbeafe" stroke="#0ea5e9" stroke-width="2"/>
  <text x="57" y="170" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#0369a1" font-weight="600">NAMESPACE</text>
  <text x="57" y="187" text-anchor="middle" font-family="monospace" font-size="10" fill="#0c4a6e" font-weight="700">ds</text>

  <!-- 2. COMPONENT: button -->
  <rect x="110" y="155" width="85" height="50" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="152" y="170" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#047857" font-weight="600">COMPONENT</text>
  <text x="152" y="187" text-anchor="middle" font-family="monospace" font-size="10" fill="#064e3b" font-weight="700">button</text>

  <!-- 3. VARIANT: primary -->
  <rect x="205" y="155" width="80" height="50" rx="6" fill="#fef08a" stroke="#eab308" stroke-width="2"/>
  <text x="245" y="170" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#854d0e" font-weight="600">VARIANT</text>
  <text x="245" y="187" text-anchor="middle" font-family="monospace" font-size="10" fill="#78350f" font-weight="700">primary</text>

  <!-- 4. CATEGORY: color -->
  <rect x="290" y="155" width="80" height="50" rx="6" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
  <text x="330" y="170" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#be185d" font-weight="600">CATEGORY</text>
  <text x="330" y="187" text-anchor="middle" font-family="monospace" font-size="10" fill="#831843" font-weight="700">color</text>

  <!-- 5. PROPERTY: bg -->
  <rect x="375" y="155" width="75" height="50" rx="6" fill="#e9d5ff" stroke="#a855f7" stroke-width="2"/>
  <text x="412" y="170" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6b21a8" font-weight="600">PROPERTY</text>
  <text x="412" y="187" text-anchor="middle" font-family="monospace" font-size="10" fill="#3b0764" font-weight="700">bg</text>

  <!-- 6. STATE: base -->
  <rect x="460" y="155" width="75" height="50" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="497" y="170" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#15803d" font-weight="600">STATE</text>
  <text x="497" y="187" text-anchor="middle" font-family="monospace" font-size="10" fill="#14532d" font-weight="700">base</text>

  <!-- Breakdown descriptions -->
  <text x="57" y="230" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#64748b">namespace</text>
  <text x="152" y="230" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#64748b">component</text>
  <text x="245" y="230" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#64748b">variant</text>
  <text x="330" y="230" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#64748b">category</text>
  <text x="412" y="230" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#64748b">property</text>
  <text x="497" y="230" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#64748b">state</text>

  <!-- Examples section -->
  <text x="20" y="270" font-family="sans-serif" font-size="11" fill="#1e293b" font-weight="700">Examples:</text>

  <!-- Example variants -->
  <text x="20" y="290" font-family="sans-serif" font-size="9" fill="#64748b">
    <tspan font-family="monospace" font-weight="600">category:</tspan> color, font, space
  </text>
  <text x="20" y="305" font-family="sans-serif" font-size="9" fill="#64748b">
    <tspan font-family="monospace" font-weight="600">property:</tspan> bg = background, text = color, border
  </text>
  <text x="20" y="320" font-family="sans-serif" font-size="9" fill="#64748b">
    <tspan font-family="monospace" font-weight="600">state:</tspan> base, hover, active, disabled
  </text>
</svg>
